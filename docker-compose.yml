# Прод-ориентированный compose. Все секреты — из .env, по умолчанию запускается
# gunicorn (APP_MODE=prod). Для локальной dev-разработки рядом лежит
# docker-compose.override.yml, который compose подхватывает автоматически и
# переключает на flask-dev-сервер с дефолтными слабыми паролями.
#
# Прод-запуск (только этот файл):
#   docker compose -f docker-compose.yml up -d --build
#
# Dev-запуск (с overlay):
#   docker compose up --build           # подхватит override автоматически
#
# Переменные, которые .env должен задавать в проде:
#   SECRET_KEY, MYSQL_ROOT_PASSWORD, MYSQL_PASSWORD

services:
  db:
    image: mysql:8.4
    container_name: qsor-db
    restart: unless-stopped
    # В проде .env обязательно подставит MYSQL_ROOT_PASSWORD и MYSQL_PASSWORD.
    # В dev-режиме (docker compose up без -f) их подставит docker-compose.override.yml.
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-qsor}
      MYSQL_USER:          ${MYSQL_USER:-qsor}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qsor-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY:  ${SECRET_KEY}
      DB_BACKEND:  mysql
      DB_HOST:     db
      DB_PORT:     "3306"
      DB_USER:     ${MYSQL_USER:-qsor}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME:     ${MYSQL_DATABASE:-qsor}
      APP_MODE:    ${APP_MODE:-prod}
    ports:
      - "${APP_HOST_PORT:-5000}:5000"

volumes:
  mysql_data:
