<?xml version="1.0" encoding="UTF-8"?>
<!-- Фавикон QSOR: ромб с компасной стрелкой внутри.
     Использует фиксированные цвета фона/штриха, чтобы хорошо смотреться
     на любом фоне браузерной вкладки. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <!-- Скруглённый ромб как фон - красный QSOR -->
    <rect x="11" y="11" width="42" height="42" rx="6" fill="#d32f2f"
          transform="rotate(45 32 32)"/>
    <!-- Стрелка-блейд белая -->
    <path d="M32 18l5 14-5 14-5-14z" fill="#ffffff"/>
    <!-- Центр-точка -->
    <circle cx="32" cy="32" r="2.4" fill="#d32f2f"/>
</svg>
