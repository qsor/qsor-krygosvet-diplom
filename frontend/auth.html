<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — QSOR</title>
    <script src="/js/theme.js"></script>
    <script src="/js/transitions.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap&subset=cyrillic,latin" rel="stylesheet">
    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<div id="layout-header"></div>

<main class="auth-page">
    <!-- Левая часть с фотом -->
    <div class="auth-poster">
        <img class="auth-poster__photo cover-img" alt="travel poster"
             src="https://picsum.photos/seed/qsor-auth-poster/1200/1400">
        <div class="auth-poster__overlay">
            <div>
                <div class="auth-poster__eyebrow">QSOR · с 2026</div>
                <h2 id="poster-title">
                    Войдите в личный кабинет — ваши брони, скидки и любимые отели уже ждут.
                </h2>
            </div>
            <div>
                <blockquote>
                    «Я бронирую тут уже три года. В кабинете все мои поездки — могу заново
                    найти отель, в котором отдыхали в 2024».
                </blockquote>
                <cite>— Анна, постоянный клиент</cite>
            </div>
        </div>
    </div>

    <!-- Правая часть: форма -->
    <div class="auth-form-wrap">
        <div class="auth-tabs">
            <button class="auth-tab is-active" data-mode="login">Войти</button>
            <button class="auth-tab" data-mode="register">Регистрация</button>
        </div>

        <form class="auth-form" id="auth-form">
            <h1 id="form-title">С возвращением</h1>
            <p id="form-desc">Войдите по email и паролю.</p>

            <!-- Поля для регистрации (скрываются для логина) -->
            <div class="field" id="field-name" style="display:none;">
                <label class="field__label">Имя</label>
                <input class="field__input" name="full_name" type="text" autocomplete="name">
                <div class="field__error" id="err-full_name"></div>
            </div>

            <div class="field">
                <label class="field__label">Email</label>
                <input class="field__input" name="email" type="email" autocomplete="email" required>
                <div class="field__error" id="err-email"></div>
            </div>

            <div class="field">
                <label class="field__label">Пароль</label>
                <div class="field__pwd">
                    <input class="field__input" name="password" type="password" autocomplete="current-password" required>
                    <button type="button" class="password-toggle" id="pwd-toggle">показать</button>
                </div>
                <div class="field__error" id="err-password"></div>
            </div>

            <div class="field" id="field-phone" style="display:none;">
                <label class="field__label">Телефон (необязательно)</label>
                <input class="field__input" name="phone" type="tel" autocomplete="tel">
            </div>

            <div class="auth-form-row" id="row-remember">
                <label class="check">
                    <input type="checkbox" checked>
                    <span class="check__box"></span>
                    Запомнить меня
                </label>
                <span class="forgot-link">Забыли пароль?</span>
            </div>

            <button type="submit" class="btn btn--primary btn--lg btn--block" id="submit-btn">
                Войти
            </button>

            <div class="auth-divider">или через</div>

            <div class="auth-social">
                <button type="button" class="btn btn--ghost" id="sso-telegram">
                    <span class="auth-social__ic" id="sso-tg-ic"></span>
                    <span>Telegram</span>
                </button>
                <button type="button" class="btn btn--ghost" id="sso-google">
                    <span class="auth-social__ic" id="sso-google-ic"></span>
                    <span>Google</span>
                </button>
            </div>

            <div class="auth-foot" id="auth-foot"></div>
        </form>
    </div>
</main>

<script src="/js/icons.js"></script>
<script src="/js/images.js"></script>
<script src="/js/api.js"></script>
<script src="/js/format.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/auth.js"></script>

</body>
</html>
